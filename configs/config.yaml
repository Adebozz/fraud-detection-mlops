# Central configuration for the fraud-detection pipeline.
data:
  openml_id: 1597            # ULB credit-card fraud dataset
  raw_path: data/raw/creditcard.parquet
  test_size: 0.2
  random_state: 42

model:
  type: xgboost
  params:
    n_estimators: 400
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.9
    colsample_bytree: 0.9
    eval_metric: aucpr
    tree_method: hist
  # scale_pos_weight is computed from class balance at train time

mlflow:
  tracking_uri: sqlite:///mlflow.db   # local DB backend; point at a server later
  experiment_name: fraud-detection
  registered_model_name: fraud-xgb

serving:
  model_dir: models
  decision_threshold: 0.5
