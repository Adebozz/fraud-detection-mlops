services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MODEL_DIR: /app/models
    volumes:
      - ./models:/app/models:ro

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.14.0
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////store/mlflow.db --artifacts-destination /store/mlartifacts
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow-store:/store

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/default.yml:ro
      - ./monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/default.yml:ro
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/fraud-api.json:ro
    depends_on:
      - prometheus
